#微服务注册到eureka配置
#注册到eureka的服务地址
eureka:
  client:
    service-url:
      defaultZone: http://127.0.0.1:6868/eureka/
  instance:
    preferIpAddress : true
    instance-id: ${spring.cloud.client.ip-address}:${spring.application.name}:${server.port}
server:
  port: 9003
spring:
  application:
    name: ihrm-employee #指定服务名
  datasource:
    driver-class-name: com.mysql.jdbc.Driver
    url: ${IHRM_MYSQL_URL:jdbc:mysql://127.0.0.1:3306/ihrm?useUnicode=true&characterEncoding=utf8&useSSL=false}
    username: ${IHRM_MYSQL_USERNAME:root}
    password: ${IHRM_MYSQL_PASSWORD:}
    hikari:
      maximum-pool-size: 2
  redis:
    host: ${IHRM_REDIS_HOST:127.0.0.1}
    port: ${IHRM_REDIS_PORT:6379}
  #3.JPA
  jpa:
    database: MySQL
    show-sql: true
    open-in-view: true

